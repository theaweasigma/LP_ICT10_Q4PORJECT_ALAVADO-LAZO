<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Google Sans', sans-serif;
            background: linear-gradient(135deg, #d8b4ff 0%, #f8c0e0 100%);
            color: #321b2b;
        }
        nav {
            background: #800000;
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 1rem 2rem;
            flex-wrap: wrap;
        }
        nav a {
            display: inline-block;
            background: #f4e4c4;
            color: #3f1f1f;
            padding: 0.75rem 1.25rem;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
        }
        .page-wrapper {
            max-width: 1100px;
            margin: 2rem auto 4rem;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: minmax(320px, 420px) minmax(320px, 1fr);
            gap: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            padding: 2rem;
            box-shadow: 0 18px 40px rgba(0,0,0,0.12);
        }
        .card h1 {
            margin-top: 0;
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }
        label {
            font-weight: 600;
            color: #4c2b45;
        }
        select, input {
            border: 1px solid #d9c5d9;
            background: #faf2fb;
            border-radius: 14px;
            padding: 0.95rem 1rem;
            font-size: 1rem;
            color: #3f1f1f;
            outline: none;
        }
        button#submit {
            width: 100%;
            border: none;
            border-radius: 14px;
            background: #f4e4c4;
            color: #3f1f1f;
            padding: 1rem 1.2rem;
            font-weight: 700;
            cursor: pointer;
        }
        button#submit:hover {
            filter: brightness(0.97);
        }
        #graph-card {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }
        #graph-card p {
            margin: 0;
            font-weight: 600;
            color: #4c2b45;
        }
        @media (max-width: 860px) {
            .page-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">Classmate</a>
        <a href="#">Attendance</a>
        <a href="#">Picture</a>
    </nav>
    <div class="page-wrapper">
        <section class="card">
            <h1>Attendance Tracker</h1>
            <div class="field">
                <label for="day">Select Day</label>
                <img src="plot.png">
                <p onclick="plot()">Click me.</p>
                <select id="day">
                    <option value="monday">Monday</option>
                    <option value="tuesday">Tuesday</option>
                    <option value="wednesday">Wednesday</option>
                    <option value="thursday">Thursday</option>
                    <option value="friday">Friday</option>
                </select>
            </div>
            <div class="field">
                <label for="num">Absences</label>
                <input type="number" id="num" value="0" min="0" />
            </div>
            <button id="submit" type="button" onclick="plot()">Submit</button>
        </section>
        <section class="card" id="graph-card">
            <p>Weekly Attendance (Absences)</p>
            <py-script src="attendance_tracker.py"></py-script>
        </section>
    </div>
    <py-config>
        packages = ['numpy', 'matplotlib']
    </py-config>
</body>
</html>
